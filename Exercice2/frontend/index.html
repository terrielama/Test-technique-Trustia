<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil - Gestion des Produits</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="navbar"></div>

<h1>Accueil - Gestion des Produits</h1>

<!-- Formulaire création / modification -->
<form id="produitForm">
    <input type="hidden" id="produitId">

    <div class="form-row">
        <label>Nom :</label>
        <input type="text" id="nom" required>
    </div>

    <div class="form-row">
        <label>Prix :</label>
        <input type="number" step="0.01" id="prix" required> €
    </div>

    <div class="form-row">
        <label>Date de péremption :</label>
        <input type="date" id="date_peremption" required>
    </div>

    <button type="submit">Enregistrer</button>
</form>

<h2>Liste des produits</h2>
<div id="produitsContainer"></div>

<!-- Pagination -->
<button id="prevPage">Précédent</button>
<span id="currentPage">1</span>
<button id="nextPage">Suivant</button>

<script src="./js/navbar.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
