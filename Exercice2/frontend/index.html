<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Produits</title>
</head>
<link rel="stylesheet" href="./css/style.css">
<body>
    <h1>Gestion des Produits</h1>

 <!----- Form création / modification ----->
    <form id="produitForm">
        <input type="hidden" id="produitId">
        <label>Nom :</label>
        <input type="text" id="nom" required>
        <label>Prix :</label>
        <input type="number" step="0.01" id="prix" required>  €
        <label>Date de péremption :</label>
        <input type="date" id="date_peremption" required>
        <button type="submit">Enregistrer</button>
    </form>

    <h2>Liste des produits</h2>
    <div id="produitsContainer"></div>

<!----- Pagination ----->
    <button id="prevPage">Précédent</button>
    <span id="currentPage">1</span>
    <button id="nextPage">Suivant</button>


<!----- Script ----->
    <script src="./js/app.js"></script>
</body>
</html>
